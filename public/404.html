  <title>Indian Country Development</title>
  <script>
    // SPA redirect for GitHub Pages
    // Redirects all 404s to index.html with the path preserved via sessionStorage
    sessionStorage.setItem('redirect', window.location.pathname + window.location.search + window.location.hash);
    window.location.replace('/');
  </script>
</head>
